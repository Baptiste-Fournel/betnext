name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Module boundaries (ready-to-split)
        run: npm run boundaries
      - name: Tests (TDD)
        run: npm test -- --ci
      - name: Build
        run: npm run build
      - name: Atomicité sur Postgres réel (zéro perte — défi 3)
        run: node scripts/atomicity-pg.cjs
      - name: Réconciliation argent sur Postgres réel (filet zéro perte — BET-15)
        run: node scripts/reconciliation-pg.cjs
      - name: Bootstrap Postgres (schéma vierge → app fonctionnelle, migrations idempotentes, seed) — BET-19
        run: node scripts/bootstrap-pg.cjs
      - name: Outbox → BullMQ → consommateur (vrai Redis)
        run: node scripts/outbox-redis.cjs
        env:
          REDIS_URL: redis://localhost:6379
      - name: Pricing extrait bus-only → OddsUpdated (vrai Redis — BET-8)
        run: node scripts/pricing-redis.cjs
        env:
          REDIS_URL: redis://localhost:6379
      - name: Read-model cotes (OddsUpdated → Redis → lecture) (vrai Redis — BET-10)
        run: node scripts/readmodel-redis.cjs
        env:
          REDIS_URL: redis://localhost:6379

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Front (monorepo) — install workspace (2 apps + 2 packages partagés)
        working-directory: web
        run: npm ci
      - name: Contrat typé régénéré depuis l'OpenAPI du back (zéro drift, zéro type écrit main)
        working-directory: web
        run: npm run generate:api
      - name: Typecheck des 2 apps + des 2 packages (garde de contrat incluse)
        working-directory: web
        run: npm run typecheck
      - name: Lint des 2 apps
        working-directory: web
        run: npm run lint
      - name: Build des 2 apps (joueur + admin)
        working-directory: web
        run: npm run build
