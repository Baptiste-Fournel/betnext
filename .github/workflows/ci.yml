name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Format check
        run: npm run format:check
      - name: Lint
        run: npm run lint
      - name: Module boundaries (ready-to-split)
        run: npm run boundaries
      - name: Tests (TDD)
        run: npm test -- --ci
      - name: Build
        run: npm run build
      - name: Atomicité sur Postgres réel (zéro perte — défi 3)
        run: node scripts/atomicity-pg.cjs
      - name: Outbox → BullMQ → consommateur (vrai Redis)
        run: node scripts/outbox-redis.cjs
        env:
          REDIS_URL: redis://localhost:6379
