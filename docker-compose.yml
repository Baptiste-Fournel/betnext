services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: betnext
      POSTGRES_PASSWORD: betnext
      POSTGRES_DB: betnext
    ports:
      - '5432:5432'
    volumes:
      - betnext_pg:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  betnext_pg:
